apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "agent.labels" . | nindent 4 }}
spec:
  replicas: 1
  # The agent owns a single tailnet identity (hostname club-host-<id>). A
  # RollingUpdate would briefly run two pods, colliding on that hostname (the
  # second joins as club-host-<id>-1 and the backend can't reach it) and, with
  # persistence on, racing for the same RWO state volume. Recreate fully stops
  # the old pod — releasing the tailnet device and the PVC — before starting
  # the new one.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agent.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels: {{- include "agent.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "agent.fullname" . }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.listenPort }}
          env:
            - name: INFERENCE_CLUB_URL
              value: {{ .Values.clubUrl | quote }}
            - name: INFERENCE_CLUB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "agent.apiKeySecretName" . }}
                  key: {{ .Values.apiKey.secretKey }}
            - name: AGENT_NAME
              value: {{ .Values.agentName | quote }}
            - name: AGENT_DISCOVERY
              value: {{ .Values.discovery.mode | quote }}
            - name: AGENT_DISCOVERY_NAMESPACE
              value: {{ include "agent.discoveryNamespace" . | quote }}
            - name: AGENT_DISCOVERY_INTERVAL
              value: {{ .Values.discovery.interval | quote }}
            - name: AGENT_LISTEN_PORT
              value: {{ .Values.listenPort | quote }}
            {{- if .Values.direct.enabled }}
            - name: AGENT_DIRECT
              value: "1"
            - name: AGENT_ADVERTISE_HOST
              value: {{ required "direct.advertiseHost is required when direct.enabled" .Values.direct.advertiseHost | quote }}
            {{- end }}
            - name: AGENT_STATE_DIR
              value: /var/lib/club-host
          volumeMounts:
            - name: state
              mountPath: /var/lib/club-host
          {{- if .Values.direct.enabled }}
          # Direct mode binds a real TCP listener on the pod IP, so kubelet can
          # probe /healthz. In tailnet mode the only listener is tsnet's
          # userspace netstack (the pod IP never binds the port), so an httpGet
          # probe would always fail — liveness is instead handled by the
          # inference.club backend prober reaching the agent over the tailnet at
          # club-host-<id>:{{ .Values.listenPort }}/healthz.
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
          {{- end }}
          {{- with .Values.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: state
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "agent.fullname" . }}-state
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
