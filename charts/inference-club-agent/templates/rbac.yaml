apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "agent.labels" . | nindent 4 }}
---
# Namespace-scoped reads for discovery: the labeled Services, their Pods and
# EndpointSlices, and GET on Secrets named by api-key-secret annotations.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agent.fullname" . }}-discovery
  namespace: {{ include "agent.discoveryNamespace" . }}
  labels: {{- include "agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [services, pods]
    verbs: [get, list]
  - apiGroups: [discovery.k8s.io]
    resources: [endpointslices]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agent.fullname" . }}-discovery
  namespace: {{ include "agent.discoveryNamespace" . }}
  labels: {{- include "agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "agent.fullname" . }}-discovery
subjects:
  - kind: ServiceAccount
    name: {{ include "agent.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
# Nodes are cluster-scoped: needed to map pods → host address + GPU facts.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "agent.fullname" . }}-nodes
  labels: {{- include "agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "agent.fullname" . }}-nodes
  labels: {{- include "agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "agent.fullname" . }}-nodes
subjects:
  - kind: ServiceAccount
    name: {{ include "agent.fullname" . }}
    namespace: {{ .Release.Namespace }}
