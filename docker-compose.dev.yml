# Local development stack for the agent — no Tailscale.
#
# Runs the agent in AGENT_DIRECT mode: it serves a plain-HTTP /v1/* surface on
# :8090 and registers with a *locally running* inference.club, reporting
# host.docker.internal:8090 as its reachable address. The dev backend (which
# must run with INFERENCE_DIRECT_AGENTS=True — its docker-compose.yml sets
# this) then reaches the agent directly. No tailnet, no auth key, fast loop.
#
# This is fully isolated from a production agent you may already be running on
# the same machine (that one is named `club-host`, uses a tailnet, and has no
# published host port): different container name, different state volume, and a
# host port (8090) the prod agent doesn't use.
#
# ── One-time setup ──────────────────────────────────────────────────────────
#   1. Bring up inference.club locally (in that repo):  docker compose up
#   2. Create a dev user + API token there. The token IS the API key:
#        cd ../inference.club/backend
#        docker compose exec backend python manage.py createsuperuser
#        docker compose exec backend python manage.py drf_create_token <username>
#   3. Put that token in .env.dev (gitignored) so it persists across restarts:
#        cp .env.dev.example .env.dev   # then edit in your token, or:
#        echo 'INFERENCE_CLUB_API_KEY=<token>' > .env.dev
#
# ── Run ─────────────────────────────────────────────────────────────────────
#   docker compose -f docker-compose.dev.yml up -d --build
#
# Watch it register and serve:
#   docker logs -f club-host-dev
#   # → "registered (direct mode) as provider_id=N reachable at http://host.docker.internal:8090/v1"
#   # → "serving (direct mode, no tailscale) on :8090 → <your LLM URL>"
services:
  club-host-dev:
    build:
      context: .
    container_name: club-host-dev
    restart: unless-stopped
    # Your dev DRF token lives in .env.dev (gitignored) as INFERENCE_CLUB_API_KEY.
    # env_file injects it into the container. Do NOT also list it under
    # `environment:` below — that would override env_file. This deliberately
    # avoids compose's auto-loaded `.env` (your PROD agent config, which also
    # defines INFERENCE_CLUB_API_KEY) leaking the prod token into dev.
    env_file:
      - .env.dev
    environment:
      AGENT_DIRECT: "1"
      # The dev inference.club backend, published on the host at :8101.
      INFERENCE_CLUB_URL: http://host.docker.internal:8101
      # Address the backend uses to reach this agent. Default already, shown
      # for clarity. Serves on :8090, published below.
      AGENT_ADVERTISE_HOST: host.docker.internal
      AGENT_LISTEN_PORT: "8090"
      # Reuse the same LLM services as prod — that's fine. Either:
      #   (a) mount agent.yaml below to use your full multi-host manifest, or
      #   (b) leave it and point LOCAL_LLM_URL at a single OpenAI-compatible server.
      LOCAL_LLM_URL: http://host.docker.internal:1234/v1
    ports:
      - "8090:8090"
    volumes:
      - club-host-dev-state:/var/lib/club-host
      # Reuse your existing service manifest (same LLMs as prod is fine).
      # agent.name in it becomes this dev provider's name.
      - ./agent.yaml:/etc/inference-club-agent/agent.yaml:ro
    extra_hosts:
      # Lets the container resolve the host on Linux too (auto on Docker
      # Desktop for Mac/Windows).
      - "host.docker.internal:host-gateway"

volumes:
  club-host-dev-state:
