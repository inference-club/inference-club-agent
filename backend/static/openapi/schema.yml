openapi: 3.0.3
info:
  title: inference-club-agent
  version: 1.0.0
  description: Inference Club Agent
paths:
  /api/inference/:
    get:
      operationId: inference_list
      tags:
      - inference
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InferenceRequest'
          description: ''
    post:
      operationId: inference_create
      tags:
      - inference
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InferenceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InferenceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InferenceRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InferenceRequest'
          description: ''
  /api/inference/{id}/:
    get:
      operationId: inference_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this inference request.
        required: true
      tags:
      - inference
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InferenceRequest'
          description: ''
    put:
      operationId: inference_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this inference request.
        required: true
      tags:
      - inference
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InferenceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InferenceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InferenceRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InferenceRequest'
          description: ''
    patch:
      operationId: inference_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this inference request.
        required: true
      tags:
      - inference
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedInferenceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedInferenceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedInferenceRequest'
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InferenceRequest'
          description: ''
    delete:
      operationId: inference_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this inference request.
        required: true
      tags:
      - inference
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '204':
          description: No response body
components:
  schemas:
    InferenceRequest:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        inference_type:
          $ref: '#/components/schemas/InferenceTypeEnum'
        payload: {}
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        response:
          readOnly: true
          nullable: true
        error_details:
          type: string
          readOnly: true
          nullable: true
        generated_image:
          type: string
          format: uri
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - error_details
      - generated_image
      - id
      - inference_type
      - payload
      - response
      - status
      - updated_at
    InferenceTypeEnum:
      enum:
      - llm_chat
      - llm_completion
      - image_generation
      type: string
      description: |-
        * `llm_chat` - LLM Chat
        * `llm_completion` - LLM Completion
        * `image_generation` - Image Generation
    PatchedInferenceRequest:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        inference_type:
          $ref: '#/components/schemas/InferenceTypeEnum'
        payload: {}
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        response:
          readOnly: true
          nullable: true
        error_details:
          type: string
          readOnly: true
          nullable: true
        generated_image:
          type: string
          format: uri
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    StatusEnum:
      enum:
      - requested
      - in_progress
      - completed
      - failed
      type: string
      description: |-
        * `requested` - Requested
        * `in_progress` - In Progress
        * `completed` - Completed
        * `failed` - Failed
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
