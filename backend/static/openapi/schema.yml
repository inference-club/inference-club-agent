components:
  schemas:
    ImageGenModel:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Name of the image generation service
          maxLength: 255
        slug:
          type: string
          description: URL-friendly identifier for the service
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        base_url:
          type: string
          format: uri
          description: Base URL for the image generation API
          maxLength: 200
        service_type:
          allOf:
          - $ref: '#/components/schemas/ServiceTypeEnum'
          description: |-
            Type of image generation service

            * `FLUX_NIM` - Flux Nim
            * `INVOKEAI` - InvokeAI
            * `COMFYUI` - ComfyUI
        service_type_display:
          type: string
          readOnly: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - base_url
      - created_at
      - id
      - name
      - service_type
      - service_type_display
      - slug
      - updated_at
    InferenceRequest:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        inference_type:
          $ref: '#/components/schemas/InferenceTypeEnum'
        payload: {}
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        response:
          readOnly: true
          nullable: true
        error_details:
          type: string
          readOnly: true
          nullable: true
        generated_image:
          type: string
          readOnly: true
        input_image:
          type: string
          nullable: true
        tts_service:
          type: integer
          nullable: true
        speech_output:
          type: string
          format: uri
          nullable: true
        speech_input:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - error_details
      - generated_image
      - id
      - inference_type
      - payload
      - response
      - status
      - updated_at
    InferenceTypeEnum:
      enum:
      - llm_chat
      - llm_completion
      - image_generation
      type: string
      description: |-
        * `llm_chat` - LLM Chat
        * `llm_completion` - LLM Completion
        * `image_generation` - Image Generation
    LLMModel:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Name of the LLM model (e.g. qwen3-8b)
          maxLength: 255
        slug:
          type: string
          readOnly: true
          description: URL-friendly version of the name
          pattern: ^[-a-zA-Z0-9_]+$
        base_url:
          type: string
          format: uri
          description: Base URL for the LLM API (e.g. http://localhost:1234/v1)
          maxLength: 200
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - base_url
      - created_at
      - id
      - name
      - slug
      - updated_at
    PatchedImageGenModel:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Name of the image generation service
          maxLength: 255
        slug:
          type: string
          description: URL-friendly identifier for the service
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        base_url:
          type: string
          format: uri
          description: Base URL for the image generation API
          maxLength: 200
        service_type:
          allOf:
          - $ref: '#/components/schemas/ServiceTypeEnum'
          description: |-
            Type of image generation service

            * `FLUX_NIM` - Flux Nim
            * `INVOKEAI` - InvokeAI
            * `COMFYUI` - ComfyUI
        service_type_display:
          type: string
          readOnly: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    PatchedInferenceRequest:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        inference_type:
          $ref: '#/components/schemas/InferenceTypeEnum'
        payload: {}
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        response:
          readOnly: true
          nullable: true
        error_details:
          type: string
          readOnly: true
          nullable: true
        generated_image:
          type: string
          readOnly: true
        input_image:
          type: string
          nullable: true
        tts_service:
          type: integer
          nullable: true
        speech_output:
          type: string
          format: uri
          nullable: true
        speech_input:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    PatchedLLMModel:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Name of the LLM model (e.g. qwen3-8b)
          maxLength: 255
        slug:
          type: string
          readOnly: true
          description: URL-friendly version of the name
          pattern: ^[-a-zA-Z0-9_]+$
        base_url:
          type: string
          format: uri
          description: Base URL for the LLM API (e.g. http://localhost:1234/v1)
          maxLength: 200
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    PatchedTTSService:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        url:
          type: string
          format: uri
          maxLength: 200
        type:
          $ref: '#/components/schemas/TypeEnum'
    ServiceTypeEnum:
      enum:
      - FLUX_NIM
      - INVOKEAI
      - COMFYUI
      type: string
      description: |-
        * `FLUX_NIM` - Flux Nim
        * `INVOKEAI` - InvokeAI
        * `COMFYUI` - ComfyUI
    StatusEnum:
      enum:
      - requested
      - in_progress
      - completed
      - failed
      type: string
      description: |-
        * `requested` - Requested
        * `in_progress` - In Progress
        * `completed` - Completed
        * `failed` - Failed
    TTSService:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        url:
          type: string
          format: uri
          maxLength: 200
        type:
          $ref: '#/components/schemas/TypeEnum'
      required:
      - id
      - slug
      - type
      - url
    TypeEnum:
      enum:
      - Dia
      - ChatTTS
      type: string
      description: |-
        * `Dia` - Dia
        * `ChatTTS` - ChatTTS
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
