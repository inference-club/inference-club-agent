<text x="398.0" y="68.6" font-size="18" fill="#1971c2">
<tspan x="398.0" dy="0.0">END USERS</tspan>
</text>
<text x="398.0" y="90.9" font-size="14" fill="#3b3b3b">
<tspan x="398.0" dy="0.0">OpenAI-compatible clients  ·  their own consumer API keys</tspan>
</text>
<text x="675.0" y="140.0" font-size="13" fill="#1971c2">
<tspan x="675.0" dy="0.0">HTTPS</tspan>
<tspan x="675.0" dy="16.2">https://inference.club/v1/*</tspan>
</text>
<text x="268.0" y="203.6" font-size="18" fill="#1971c2">
<tspan x="268.0" dy="0.0">inference.club — central service</tspan>
</text>
<text x="268.0" y="225.9" font-size="14" fill="#3b3b3b">
<tspan x="268.0" dy="0.0">separate repo: Django API + Nuxt UI + Postgres</tspan>
<tspan x="268.0" dy="17.5">• authenticates request, selects provider + model</tspan>
<tspan x="268.0" dy="17.5">• mints ephemeral Tailscale auth keys (tag:club-host)</tspan>
<tspan x="268.0" dy="17.5">• reverse-proxies /v1/* to the chosen agent over the tailnet</tspan>
</text>
<text x="120.0" y="311.0" font-size="12" fill="#c2255c">
<tspan x="120.0" dy="0.0">(1) register + heartbeat</tspan>
<tspan x="120.0" dy="15.0">POST /api/inference/agent/register/</tspan>
<tspan x="120.0" dy="15.0">Authorization: Bearer</tspan>
<tspan x="120.0" dy="15.0">            INFERENCE_CLUB_API_KEY</tspan>
</text>
<text x="915.0" y="323.0" font-size="12" fill="#1971c2">
<tspan x="915.0" dy="0.0">(3) /v1/* request</tspan>
<tspan x="915.0" dy="15.0">over the tailnet</tspan>
</text>
<text x="218.0" y="415.6" font-size="17" fill="#2f9e44">
<tspan x="218.0" dy="0.0">Tailscale tailnet  (userspace WireGuard mesh)</tspan>
</text>
<text x="218.0" y="436.9" font-size="14" fill="#3b3b3b">
<tspan x="218.0" dy="0.0">control plane mints authkey  →  agent joins as  club-host-&lt;id&gt;   (tailnet IP : 443)</tspan>
</text>
<text x="140.0" y="533.8" font-size="15" fill="#868e96">
<tspan x="140.0" dy="0.0">YOUR  k3s / Kubernetes  cluster</tspan>
</text>
<text x="140.0" y="587.6" font-size="17" fill="#e8590c">
<tspan x="140.0" dy="0.0">agent pod   (this repo — single Go binary; helm release in ns inference-club)</tspan>
</text>
<text x="168.0" y="646.7" font-size="16" fill="#e8590c">
<tspan x="168.0" dy="0.0">tsnet</tspan>
</text>
<text x="168.0" y="667.0" font-size="13" fill="#3b3b3b">
<tspan x="168.0" dy="0.0">userspace WireGuard</tspan>
<tspan x="168.0" dy="16.2">serves :443 on the</tspan>
<tspan x="168.0" dy="16.2">tailnet IP</tspan>
</text>
<text x="533.0" y="646.7" font-size="16" fill="#e8590c">
<tspan x="533.0" dy="0.0">HTTP router</tspan>
</text>
<text x="533.0" y="667.0" font-size="13" fill="#3b3b3b">
<tspan x="533.0" dy="0.0">/v1/* path routed to a</tspan>
<tspan x="533.0" dy="16.2">Service by type:</tspan>
<tspan x="533.0" dy="16.2">llm · stt · tts · image</tspan>
<tspan x="533.0" dy="16.2">music · video · scrape</tspan>
</text>
<text x="938.0" y="645.8" font-size="15" fill="#e8590c">
<tspan x="938.0" dy="0.0">discovery poll loop  (30s)</tspan>
</text>
<text x="938.0" y="664.0" font-size="12" fill="#3b3b3b">
<tspan x="938.0" dy="0.0">LIST services (managed=true),</tspan>
<tspan x="938.0" dy="15.0">pods, endpointslices, nodes</tspan>
<tspan x="938.0" dy="15.0">build + validate manifest</tspan>
<tspan x="938.0" dy="15.0">(2) push to inference.club</tspan>
</text>
<text x="938.0" y="825.8" font-size="15" fill="#0c8599">
<tspan x="938.0" dy="0.0">k8s API server</tspan>
</text>
<text x="938.0" y="844.0" font-size="12" fill="#3b3b3b">
<tspan x="938.0" dy="0.0">read-only RBAC get/list</tspan>
</text>
<text x="1170.0" y="819.0" font-size="12" fill="#495057">
<tspan x="1170.0" dy="0.0">scrapes</tspan>
<tspan x="1170.0" dy="15.0">dcgm :9400</tspan>
<tspan x="1170.0" dy="15.0">vram :9401</tspan>
</text>
<text x="1115.0" y="531.0" font-size="12" fill="#2b8a3e">
<tspan x="1115.0" dy="0.0">(2) manifest</tspan>
<tspan x="1115.0" dy="15.0">push</tspan>
</text>
<text x="705.0" y="849.0" font-size="12" fill="#e8590c">
<tspan x="705.0" dy="0.0">proxies to ClusterIP DNS</tspan>
<tspan x="705.0" dy="15.0">&lt;svc&gt;.&lt;ns&gt;.svc.cluster.local:port</tspan>
</text>
<text x="140.0" y="959.6" font-size="17" fill="#6741d9">
<tspan x="140.0" dy="0.0">your inference Services   (ClusterIP, labelled  inference-club.com/managed=true)</tspan>
</text>
<text x="168.0" y="1015.8" font-size="15" fill="#6741d9">
<tspan x="168.0" dy="0.0">svc/my-vllm : 8000</tspan>
</text>
<text x="583.0" y="1014.9" font-size="14" fill="#6741d9">
<tspan x="583.0" dy="0.0">pod on GPU node A   (nvidia.com/gpu + GFD labels → model / VRAM)</tspan>
</text>
<text x="168.0" y="1073.8" font-size="15" fill="#6741d9">
<tspan x="168.0" dy="0.0">svc/my-tts : 9000</tspan>
</text>
<text x="583.0" y="1072.9" font-size="14" fill="#6741d9">
<tspan x="583.0" dy="0.0">pod on GPU node B</tspan>
</text>
<text x="168.0" y="1131.8" font-size="15" fill="#6741d9">
<tspan x="168.0" dy="0.0">svc/my-asr : 8105</tspan>
</text>
<text x="583.0" y="1130.9" font-size="14" fill="#6741d9">
<tspan x="583.0" dy="0.0">pod on GPU node C</tspan>
</text>
</svg>